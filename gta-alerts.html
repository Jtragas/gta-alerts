<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA Alerts - Greater Toronto Area Public Safety & Transit Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-surface-elevated: #fafafa;
            --color-border: #e0e0e0;
            --color-text: #1a1a1a;
            --color-text-muted: #666666;
            --color-text-dim: #999999;
            
            --color-fire: #ff4757;
            --color-police: #3742fa;
            --color-ttc: #e84118;
            --color-road: #ffa502;
            --color-weather: #5f27cd;
            --color-camera: #48dbfb;
            
            --color-primary: #FF0000;
            --color-primary-dark: #CC0000;
            
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Archivo', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 380px;
            background: var(--color-surface);
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
            height: 100vh;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease;
        }

        .header {
            padding: 24px 24px 20px;
            border-bottom: 1px solid var(--color-border);
            background: var(--color-surface-elevated);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #FF0000 0%, #CC0000 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: white;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 13px;
            color: var(--color-text-muted);
            margin-top: 4px;
            line-height: 1.4;
        }

        .emergency-banner {
            margin-top: 16px;
            padding: 12px;
            background: rgba(255, 0, 0, 0.08);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 6px;
            font-size: 12px;
            color: #CC0000;
            font-weight: 500;
        }

        .view-toggle {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .view-btn {
            flex: 1;
            padding: 8px 12px;
            background: var(--color-surface-elevated);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            color: var(--color-text);
        }

        .view-btn:hover {
            background: var(--color-surface);
            border-color: var(--color-text-muted);
        }

        .view-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .controls {
            padding: 20px 24px;
            border-bottom: 1px solid var(--color-border);
            background: var(--color-surface);
        }

        .sidebar.list-mode .controls {
            display: none;
        }

        .sidebar.list-mode .header {
            max-width: 900px;
            margin: 0 auto;
            border-bottom: 2px solid var(--color-border);
        }

        .sidebar.list-mode .incidents-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .incidents-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .incidents-table thead {
            background: var(--color-surface-elevated);
            border-bottom: 2px solid var(--color-border);
        }

        .incidents-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text-muted);
        }

        .incidents-table td {
            padding: 16px;
            border-bottom: 1px solid var(--color-border);
            vertical-align: top;
        }

        .incidents-table tbody tr {
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .incidents-table tbody tr:hover {
            background: var(--color-surface-elevated);
        }

        .table-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--color-text);
            white-space: nowrap;
        }

        .table-category {
            display: inline-block;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: white;
            white-space: nowrap;
        }

        .table-type {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            color: var(--color-text);
        }

        .table-description {
            font-size: 13px;
            color: var(--color-text-muted);
            line-height: 1.4;
        }

        .table-distance {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--color-text-dim);
            white-space: nowrap;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text-muted);
            margin-bottom: 10px;
            display: block;
        }

        .radius-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .radius-btn {
            padding: 10px 8px;
            border: 1px solid var(--color-border);
            background: var(--color-surface-elevated);
            color: var(--color-text);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: 'JetBrains Mono', monospace;
        }

        .radius-btn:hover {
            border-color: var(--color-text-muted);
            background: var(--color-surface);
        }

        .radius-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .category-filters {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .category-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            background: var(--color-surface-elevated);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .category-toggle:hover {
            border-color: var(--color-text-dim);
            background: var(--color-surface);
        }

        .category-toggle.active {
            border-color: currentColor;
            background: rgba(255, 255, 255, 0.05);
        }

        .category-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .category-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .category-name {
            font-size: 14px;
            font-weight: 500;
        }

        .category-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--color-text-muted);
            background: var(--color-surface);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .incidents-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 24px;
        }

        .incidents-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .incidents-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text-muted);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 500;
            color: #10b981;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .incident-card {
            background: var(--color-surface-elevated);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .incident-card:hover {
            border-color: var(--color-text-dim);
            background: var(--color-surface);
            transform: translateX(2px);
        }

        .incident-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .incident-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .incident-content {
            flex: 1;
            min-width: 0;
        }

        .incident-type {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .incident-description {
            font-size: 12px;
            color: var(--color-text-muted);
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .incident-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--color-text-dim);
        }

        .map-container {
            flex: 1;
            position: relative;
            background: #e8e8e8;
            overflow: hidden;
        }

        #mapCanvas {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #mapCanvas:active {
            cursor: grabbing;
        }

        #mapCanvas.clickable {
            cursor: pointer;
        }

        .map-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 500;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .map-btn {
            width: 44px;
            height: 44px;
            background: var(--color-surface-elevated);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: var(--shadow-md);
            font-size: 18px;
        }

        .map-btn:hover {
            background: var(--color-surface);
            border-color: var(--color-text-dim);
        }

        .zoom-controls {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .zoom-btn {
            width: 44px;
            height: 40px;
            background: var(--color-surface-elevated);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            font-weight: 600;
            color: var(--color-text);
        }

        .zoom-btn:hover {
            background: var(--color-surface);
        }

        .incidents-container::-webkit-scrollbar {
            width: 6px;
        }

        .incidents-container::-webkit-scrollbar-track {
            background: var(--color-surface);
        }

        .incidents-container::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 3px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .mobile-toggle {
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-toggle {
                display: flex;
                position: absolute;
                top: 20px;
                left: 20px;
                z-index: 501;
                width: 44px;
                height: 44px;
                background: var(--color-surface-elevated);
                border: 1px solid var(--color-border);
                border-radius: 8px;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                box-shadow: var(--shadow-md);
                font-size: 20px;
            }
        }

        .map-popup {
            position: absolute;
            background: white;
            border: 2px solid var(--color-primary);
            border-radius: 12px;
            padding: 0;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            min-width: 280px;
            max-width: 320px;
            z-index: 1000;
            display: none;
        }

        .map-popup.visible {
            display: block;
        }

        .popup-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 24px;
            height: 24px;
            background: rgba(0, 0, 0, 0.1);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #666;
            transition: all 0.15s ease;
        }

        .popup-close:hover {
            background: rgba(0, 0, 0, 0.2);
            color: #000;
        }

        .popup-content {
            padding: 16px;
        }

        .popup-header {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--color-border);
            color: var(--color-text);
            padding-right: 30px;
        }

        .popup-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--color-surface-elevated);
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .popup-category-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .popup-detail {
            font-size: 13px;
            color: var(--color-text-muted);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .popup-meta {
            display: flex;
            gap: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--color-border);
        }

        .popup-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--color-text-dim);
        }

        .popup-location {
            font-size: 12px;
            color: var(--color-text-muted);
            margin-top: 8px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="header">
                <div class="logo">
                    <div class="logo-icon">🚨</div>
                    <div class="logo-text">GTA Alerts</div>
                </div>
                <div class="tagline">Real-time public safety & transit alerts for the Greater Toronto Area</div>
                <div class="view-toggle">
                    <button class="view-btn active" data-view="map">🗺️ Map View</button>
                    <button class="view-btn" data-view="list">📋 List View</button>
                </div>
                <div class="emergency-banner">
                    ⚠️ In an emergency, call 911. This is not an official emergency service.
                </div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label class="control-label">Alert Radius</label>
                    <div class="radius-selector">
                        <button class="radius-btn" data-radius="0.25">250m</button>
                        <button class="radius-btn" data-radius="0.5">500m</button>
                        <button class="radius-btn active" data-radius="1">1km</button>
                        <button class="radius-btn" data-radius="3">3km</button>
                        <button class="radius-btn" data-radius="5">5km</button>
                        <button class="radius-btn" data-radius="10">10km</button>
                        <button class="radius-btn" data-radius="20">20km</button>
                        <button class="radius-btn" data-radius="100">GTA</button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Alert Categories</label>
                    <div class="category-filters">
                        <div class="category-toggle active" data-category="fire">
                            <div class="category-info">
                                <div class="category-dot" style="background: var(--color-fire)"></div>
                                <span class="category-name">Fire / Rescue</span>
                            </div>
                            <span class="category-count">0</span>
                        </div>
                        <div class="category-toggle active" data-category="police">
                            <div class="category-info">
                                <div class="category-dot" style="background: var(--color-police)"></div>
                                <span class="category-name">Police</span>
                            </div>
                            <span class="category-count">0</span>
                        </div>
                        <div class="category-toggle active" data-category="ttc">
                            <div class="category-info">
                                <div class="category-dot" style="background: var(--color-ttc)"></div>
                                <span class="category-name">TTC Alerts</span>
                            </div>
                            <span class="category-count">0</span>
                        </div>
                        <div class="category-toggle active" data-category="road">
                            <div class="category-info">
                                <div class="category-dot" style="background: var(--color-road)"></div>
                                <span class="category-name">Road / Traffic</span>
                            </div>
                            <span class="category-count">0</span>
                        </div>
                        <div class="category-toggle active" data-category="weather">
                            <div class="category-info">
                                <div class="category-dot" style="background: var(--color-weather)"></div>
                                <span class="category-name">Weather</span>
                            </div>
                            <span class="category-count">0</span>
                        </div>
                        <div class="category-toggle active" data-category="camera">
                            <div class="category-info">
                                <div class="category-dot" style="background: var(--color-camera)"></div>
                                <span class="category-name">Traffic Cameras</span>
                            </div>
                            <span class="category-count">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="incidents-container" id="incidentsList">
                <div class="incidents-header">
                    <div class="incidents-title">Active Incidents</div>
                    <div class="live-indicator">
                        <div class="live-dot"></div>
                        <span>LIVE</span>
                    </div>
                </div>
            </div>
        </aside>

        <div class="map-container">
            <canvas id="mapCanvas"></canvas>
            <div class="map-popup" id="mapPopup"></div>
            <div class="map-controls">
                <div class="zoom-controls">
                    <div class="zoom-btn" id="zoomIn">+</div>
                    <div class="zoom-btn" id="zoomOut">−</div>
                </div>
                <div class="map-btn" id="locateBtn" title="Center on my location">📍</div>
                <div class="map-btn" id="refreshBtn" title="Refresh data">🔄</div>
            </div>
        </div>

        <div class="mobile-toggle" id="mobileToggle">☰</div>
    </div>

    <script>
const app = {
    canvas: null,
    ctx: null,
    center: { lat: 43.6532, lon: -79.3832 }, // Toronto
    zoom: 11,
    tileSize: 256,
    activeRadius: 1,
    activeCategories: new Set(['fire', 'police', 'ttc', 'road', 'weather', 'camera']),
    isDragging: false,
    lastMouse: { x: 0, y: 0 },
    tiles: {},

    categoryConfig: {
        fire: { color: '#ff4757', icon: '🔥', name: 'Fire / Rescue' },
        police: { color: '#3742fa', icon: '🚓', name: 'Police' },
        ttc: { color: '#e84118', icon: '🚇', name: 'TTC Alert' },
        road: { color: '#ffa502', icon: '🚧', name: 'Road / Traffic' },
        weather: { color: '#5f27cd', icon: '⛈️', name: 'Weather' },
        camera: { color: '#48dbfb', icon: '📹', name: 'Traffic Camera' }
    },

    // ============================================
    // API Configuration
    // ============================================
    // CHANGE THIS to your deployed backend URL after you deploy
    // Examples:
    // 'https://gta-alerts-production.up.railway.app'
    // 'https://gta-alerts.onrender.com'
    API_URL: 'http://localhost:3000', // Change this after deployment!

    // Real incidents from API
    sampleIncidents: [],
    
    async fetchRealIncidents() {
        try {
            console.log('📡 Fetching real incidents from API...');
            const response = await fetch(`${this.API_URL}/api/incidents`);
            const data = await response.json();
            
            if (data.success && data.incidents) {
                this.sampleIncidents = data.incidents.map(incident => ({
                    id: incident.id,
                    category: incident.category,
                    type: incident.type,
                    description: incident.description,
                    lat: incident.lat,
                    lon: incident.lon,
                    time: new Date(incident.time),
                    severity: incident.alarmLevel || 'medium'
                }));
                
                console.log(`✅ Loaded ${this.sampleIncidents.length} real incidents`);
                return true;
            } else {
                console.error('❌ API returned no data');
                return false;
            }
        } catch (error) {
            console.error('❌ Error fetching incidents:', error);
            // Fall back to sample data if API fails
            this.loadSampleData();
            return false;
        }
    },
    
    // Fallback sample data in case API is not available yet
    loadSampleData() {
        console.log('⚠️ Using sample data (API not available)');
        this.sampleIncidents = [
            { id: 1, category: 'fire', type: 'Structure Fire', description: 'Multi-alarm fire at commercial building, King St W & Bathurst', lat: 43.6426, lon: -79.4025, time: new Date(Date.now() - 15 * 60000) },
            { id: 2, category: 'police', type: 'Traffic Collision', description: 'Multi-vehicle collision blocking lanes, DVP southbound at Eglinton', lat: 43.7056, lon: -79.3364, time: new Date(Date.now() - 32 * 60000) },

    init() {
        console.log('Initializing GTA Alerts...');
        this.canvas = document.getElementById('mapCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resizeCanvas();
        this.setupEventListeners();
        
        // Fetch real data from API
        this.fetchRealIncidents().then(() => {
            this.render();
            this.updateIncidentsList();
        });
        
        // Auto-refresh every 5 minutes
        setInterval(() => {
            this.fetchRealIncidents().then(() => {
                this.render();
                this.updateIncidentsList();
            });
        }, 5 * 60 * 1000); // 5 minutes
        
        console.log('GTA Alerts loaded successfully!');
    },

    resizeCanvas() {
        const container = this.canvas.parentElement;
        this.canvas.width = container.clientWidth;
        this.canvas.height = container.clientHeight;
        // Clear tile cache on resize to reload fresh
        this.tiles = {};
        this.render();
    },

    latLonToPixel(lat, lon) {
        const scale = Math.pow(2, this.zoom);
        const worldSize = this.tileSize * scale;
        
        const x = (lon + 180) / 360 * worldSize;
        const latRad = lat * Math.PI / 180;
        const y = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * worldSize;
        
        const centerX = (this.center.lon + 180) / 360 * worldSize;
        const centerLatRad = this.center.lat * Math.PI / 180;
        const centerY = (1 - Math.log(Math.tan(centerLatRad) + 1 / Math.cos(centerLatRad)) / Math.PI) / 2 * worldSize;
        
        return {
            x: (x - centerX) + this.canvas.width / 2,
            y: (y - centerY) + this.canvas.height / 2
        };
    },

    calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    },

    drawMapTiles() {
        const scale = Math.pow(2, this.zoom);
        const worldSize = this.tileSize * scale;
        
        const centerX = (this.center.lon + 180) / 360 * worldSize;
        const centerLatRad = this.center.lat * Math.PI / 180;
        const centerY = (1 - Math.log(Math.tan(centerLatRad) + 1 / Math.cos(centerLatRad)) / Math.PI) / 2 * worldSize;
        
        const startTileX = Math.floor((centerX - this.canvas.width / 2) / this.tileSize);
        const startTileY = Math.floor((centerY - this.canvas.height / 2) / this.tileSize);
        const endTileX = Math.ceil((centerX + this.canvas.width / 2) / this.tileSize);
        const endTileY = Math.ceil((centerY + this.canvas.height / 2) / this.tileSize);
        
        for (let x = startTileX; x <= endTileX; x++) {
            for (let y = startTileY; y <= endTileY; y++) {
                const tileKey = `${this.zoom}-${x}-${y}`;
                
                if (!this.tiles[tileKey]) {
                    this.tiles[tileKey] = { loading: true, img: null };
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () => {
                        this.tiles[tileKey] = { loading: false, img: img };
                        this.render();
                    };
                    img.onerror = () => {
                        this.tiles[tileKey] = { loading: false, img: null };
                    };
                    const servers = ['a', 'b', 'c'];
                    const server = servers[Math.abs(x + y) % 3];
                    img.src = `https://${server}.tile.openstreetmap.org/${this.zoom}/${x}/${y}.png`;
                }
                
                if (this.tiles[tileKey] && this.tiles[tileKey].img) {
                    const screenX = (x * this.tileSize - centerX) + this.canvas.width / 2;
                    const screenY = (y * this.tileSize - centerY) + this.canvas.height / 2;
                    this.ctx.drawImage(this.tiles[tileKey].img, screenX, screenY);
                }
            }
        }
    },

    filterIncidents() {
        return this.sampleIncidents.filter(incident => {
            if (!this.activeCategories.has(incident.category)) return false;
            const distance = this.calculateDistance(
                this.center.lat, this.center.lon,
                incident.lat, incident.lon
            );
            return distance <= this.activeRadius;
        });
    },

    render() {
        const ctx = this.ctx;
        ctx.fillStyle = '#f0f0f0';
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        // Draw map tiles
        this.drawMapTiles();

        // Draw radius circle - much more subtle
        const centerPixel = this.latLonToPixel(this.center.lat, this.center.lon);
        const radiusPixels = this.activeRadius * 1000 / (156543.03392 * Math.cos(this.center.lat * Math.PI / 180) / Math.pow(2, this.zoom));
        
        ctx.strokeStyle = 'rgba(255, 0, 0, 0.3)';
        ctx.fillStyle = 'rgba(255, 0, 0, 0.02)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(centerPixel.x, centerPixel.y, radiusPixels, 0, 2 * Math.PI);
        ctx.fill();
        ctx.stroke();

        // Draw center marker - smaller and more subtle
        ctx.fillStyle = '#FF0000';
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(centerPixel.x, centerPixel.y, 5, 0, 2 * Math.PI);
        ctx.fill();
        ctx.stroke();

        // Draw incidents
        const filtered = this.filterIncidents();
        filtered.forEach(incident => {
            const config = this.categoryConfig[incident.category];
            const pos = this.latLonToPixel(incident.lat, incident.lon);
            
            if (pos.x < -50 || pos.x > this.canvas.width + 50 || pos.y < -50 || pos.y > this.canvas.height + 50) return;
            
            // Draw marker circle
            ctx.fillStyle = config.color;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 16, 0, 2 * Math.PI);
            ctx.fill();
            ctx.stroke();
            
            // Draw icon
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(config.icon, pos.x, pos.y);
        });

        // Draw zoom level indicator
        ctx.fillStyle = '#333333';
        ctx.font = '12px JetBrains Mono';
        ctx.textAlign = 'left';
        ctx.fillText(`Zoom: ${this.zoom}`, 10, 20);
    },

    formatTimeAgo(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        
        let timeAgo;
        if (seconds < 60) timeAgo = `${seconds}s ago`;
        else {
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) timeAgo = `${minutes}m ago`;
            else {
                const hours = Math.floor(minutes / 60);
                if (hours < 24) timeAgo = `${hours}h ago`;
                else timeAgo = `${Math.floor(hours / 24)}d ago`;
            }
        }
        
        // Add actual time
        const timeStr = date.toLocaleTimeString('en-US', { 
            hour: 'numeric', 
            minute: '2-digit',
            hour12: true 
        });
        
        return `${timeAgo} (${timeStr})`;
    },

    updateIncidentsList() {
        const container = document.getElementById('incidentsList');
        const oldCards = container.querySelectorAll('.incident-card, .empty-state, .incidents-table');
        oldCards.forEach(el => el.remove());

        // Check if we're in list view
        const isListView = document.querySelector('[data-view="list"]').classList.contains('active');
        
        // In list view, show ALL incidents regardless of radius
        // In map view, filter by radius
        const incidents = isListView ? 
            this.sampleIncidents.filter(inc => this.activeCategories.has(inc.category)) :
            this.filterIncidents();

        if (incidents.length === 0) {
            container.insertAdjacentHTML('beforeend', `
                <div class="empty-state">
                    <div class="empty-state-icon">🔍</div>
                    <div style="font-size: 14px; margin-bottom: 8px;">No incidents in this area</div>
                    <div style="font-size: 12px; color: var(--color-text-dim);">Try expanding your radius or enabling more categories</div>
                </div>
            `);
            this.updateCategoryCounts();
            return;
        }

        incidents.sort((a, b) => b.time - a.time);

        if (isListView) {
            // Table layout for list view
            const table = document.createElement('table');
            table.className = 'incidents-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Type</th>
                        <th>Description</th>
                        <th>Distance</th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;
            
            const tbody = table.querySelector('tbody');
            
            incidents.forEach(incident => {
                const config = this.categoryConfig[incident.category];
                const distance = this.calculateDistance(
                    this.center.lat, this.center.lon,
                    incident.lat, incident.lon
                );
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="table-time">${this.formatTimeAgo(incident.time)}</td>
                    <td>
                        <span class="table-category" style="background: ${config.color}">${config.name}</span>
                    </td>
                    <td>
                        <div class="table-type">${incident.type}</div>
                        <div class="table-description">${incident.description}</div>
                    </td>
                    <td class="table-distance">${distance.toFixed(1)}km</td>
                `;
                
                row.onclick = () => {
                    document.querySelector('[data-view="map"]').click();
                    this.center = { lat: incident.lat, lon: incident.lon };
                    this.zoom = Math.max(this.zoom, 14);
                    this.render();
                    setTimeout(() => {
                        const pos = this.latLonToPixel(incident.lat, incident.lon);
                        const rect = this.canvas.getBoundingClientRect();
                        this.showPopup(incident, rect.left + pos.x, rect.top + pos.y);
                    }, 100);
                };
                
                tbody.appendChild(row);
            });
            
            container.appendChild(table);
            
        } else {
            // Card layout for map view
            incidents.forEach(incident => {
                const config = this.categoryConfig[incident.category];
                const distance = this.calculateDistance(
                    this.center.lat, this.center.lon,
                    incident.lat, incident.lon
                );

                const card = document.createElement('div');
                card.className = 'incident-card';
                card.innerHTML = `
                    <div class="incident-header">
                        <div class="incident-icon" style="background: ${config.color}">${config.icon}</div>
                        <div class="incident-content">
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap;">
                                <div class="incident-type">${incident.type}</div>
                                <div style="font-size: 10px; padding: 3px 10px; background: ${config.color}; color: white; border-radius: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;">${config.name}</div>
                            </div>
                            <div class="incident-description">${incident.description}</div>
                            <div class="incident-meta">
                                <div>⏱ ${this.formatTimeAgo(incident.time)}</div>
                                <div>📍 ${distance.toFixed(1)}km</div>
                            </div>
                        </div>
                    </div>
                `;

                card.onclick = () => {
                    this.center = { lat: incident.lat, lon: incident.lon };
                    this.zoom = Math.max(this.zoom, 14);
                    this.render();
                    setTimeout(() => {
                        const pos = this.latLonToPixel(incident.lat, incident.lon);
                        const rect = this.canvas.getBoundingClientRect();
                        this.showPopup(incident, rect.left + pos.x, rect.top + pos.y);
                    }, 100);
                };

                container.appendChild(card);
            });
        }

        this.updateCategoryCounts();
    },

    updateCategoryCounts() {
        // Check if we're in list view
        const isListView = document.querySelector('[data-view="list"]')?.classList.contains('active');
        
        // In list view, count ALL incidents (not filtered by radius)
        // In map view, count only incidents within radius
        const incidents = isListView ? 
            this.sampleIncidents.filter(inc => this.activeCategories.has(inc.category)) :
            this.filterIncidents();
            
        const counts = {};
        Object.keys(this.categoryConfig).forEach(cat => counts[cat] = 0);
        incidents.forEach(inc => counts[inc.category]++);

        document.querySelectorAll('.category-toggle').forEach(toggle => {
            const cat = toggle.dataset.category;
            toggle.querySelector('.category-count').textContent = counts[cat] || 0;
        });
    },

    handleMapClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;

        const filtered = this.filterIncidents();
        
        for (let i = filtered.length - 1; i >= 0; i--) {
            const incident = filtered[i];
            const pos = this.latLonToPixel(incident.lat, incident.lon);
            
            const distance = Math.sqrt(Math.pow(clickX - pos.x, 2) + Math.pow(clickY - pos.y, 2));
            
            if (distance <= 16) {
                this.showPopup(incident, e.clientX, e.clientY);
                return;
            }
        }
        
        // Clicked outside any marker, hide popup
        this.hidePopup();
    },

    showPopup(incident, screenX, screenY) {
        const popup = document.getElementById('mapPopup');
        const config = this.categoryConfig[incident.category];
        
        const distance = this.calculateDistance(
            this.center.lat, this.center.lon,
            incident.lat, incident.lon
        );

        popup.innerHTML = `
            <button class="popup-close" onclick="app.hidePopup()">×</button>
            <div class="popup-content">
                <div class="popup-category" style="color: ${config.color}">
                    <div class="popup-category-dot" style="background: ${config.color}"></div>
                    ${config.name}
                </div>
                <div class="popup-header">${incident.type}</div>
                <div class="popup-detail">${incident.description}</div>
                <div class="popup-meta">
                    <div class="popup-meta-item">⏱ ${this.formatTimeAgo(incident.time)}</div>
                    <div class="popup-meta-item">📍 ${distance.toFixed(1)}km away</div>
                </div>
            </div>
        `;

        // Position popup, adjusting to keep it on screen
        const popupWidth = 320;
        const popupHeight = 200;
        
        let left = screenX - popupWidth / 2;
        let top = screenY - popupHeight - 40;
        
        // Keep within screen bounds
        if (left < 10) left = 10;
        if (left + popupWidth > window.innerWidth - 10) left = window.innerWidth - popupWidth - 10;
        if (top < 10) top = screenY + 20; // Show below if would be cut off at top
        if (top + popupHeight > window.innerHeight - 10) top = window.innerHeight - popupHeight - 10;

        popup.style.left = left + 'px';
        popup.style.top = top + 'px';
        popup.classList.add('visible');
    },

    hidePopup() {
        document.getElementById('mapPopup').classList.remove('visible');
    },

    setupEventListeners() {
        // View toggle
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const view = btn.dataset.view;
                
                const mapContainer = document.querySelector('.map-container');
                const sidebar = document.querySelector('.sidebar');
                const incidentsList = document.getElementById('incidentsList');
                
                if (view === 'list') {
                    // List view - hide map completely, show full-width list
                    mapContainer.style.display = 'none';
                    sidebar.style.width = '100%';
                    sidebar.style.borderRight = 'none';
                    sidebar.style.boxShadow = 'none';
                    sidebar.classList.add('list-mode');
                    incidentsList.style.display = 'flex';
                } else {
                    // Map view - restore normal layout, HIDE incidents list
                    mapContainer.style.display = 'block';
                    sidebar.style.width = '380px';
                    sidebar.style.borderRight = '1px solid var(--color-border)';
                    sidebar.style.boxShadow = 'var(--shadow-lg)';
                    sidebar.classList.remove('list-mode');
                    incidentsList.style.display = 'none';
                }
                
                // Refresh the incidents list for the new view
                this.updateIncidentsList();
            };
        });

        // Add sidebar toggle button
        const toggleBtn = document.createElement('div');
        toggleBtn.className = 'sidebar-toggle';
        toggleBtn.innerHTML = '☰';
        toggleBtn.style.cssText = `
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1001;
            width: 44px;
            height: 44px;
            background: white;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            box-shadow: var(--shadow-md);
        `;
        toggleBtn.onclick = () => {
            const sidebar = document.querySelector('.sidebar');
            const isMapView = document.querySelector('[data-view="map"]').classList.contains('active');
            if (isMapView) {
                if (sidebar.style.transform === 'translateX(-100%)') {
                    sidebar.style.transform = 'translateX(0)';
                } else {
                    sidebar.style.transform = 'translateX(-100%)';
                }
            }
        };
        document.querySelector('.map-container').appendChild(toggleBtn);

        // Radius buttons
        document.querySelectorAll('.radius-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.radius-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                this.activeRadius = parseFloat(btn.dataset.radius);
                this.render();
                this.updateIncidentsList();
            };
        });

        // Category toggles
        document.querySelectorAll('.category-toggle').forEach(toggle => {
            toggle.onclick = () => {
                const cat = toggle.dataset.category;
                if (this.activeCategories.has(cat)) {
                    this.activeCategories.delete(cat);
                    toggle.classList.remove('active');
                } else {
                    this.activeCategories.add(cat);
                    toggle.classList.add('active');
                }
                this.render();
                this.updateIncidentsList();
            };
        });

        // Zoom controls
        document.getElementById('zoomIn').onclick = () => {
            if (this.zoom < 18) {
                this.zoom++;
                this.render();
            }
        };

        document.getElementById('zoomOut').onclick = () => {
            if (this.zoom > 3) {
                this.zoom--;
                this.render();
            }
        };

        // Locate button
        document.getElementById('locateBtn').onclick = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    this.center = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    this.zoom = 13;
                    this.render();
                    this.updateIncidentsList();
                });
            }
        };

        // Refresh button
        document.getElementById('refreshBtn').onclick = () => {
            const btn = document.getElementById('refreshBtn');
            btn.style.transform = 'rotate(360deg)';
            btn.style.transition = 'transform 0.5s ease';
            setTimeout(() => {
                btn.style.transform = '';
                this.updateIncidentsList();
                this.render();
            }, 500);
        };

        // Mobile toggle
        document.getElementById('mobileToggle').onclick = () => {
            document.getElementById('sidebar').classList.toggle('open');
        };

        // Canvas dragging
        this.canvas.addEventListener('mousedown', e => {
            this.isDragging = true;
            this.dragStart = { x: e.clientX, y: e.clientY };
            this.lastMouse = { x: e.clientX, y: e.clientY };
        });

        this.canvas.addEventListener('mousemove', e => {
            if (this.isDragging) {
                const dx = e.clientX - this.lastMouse.x;
                const dy = e.clientY - this.lastMouse.y;
                
                const scale = Math.pow(2, this.zoom);
                const worldSize = this.tileSize * scale;
                const metersPerPixel = 156543.03392 * Math.cos(this.center.lat * Math.PI / 180) / Math.pow(2, this.zoom);
                
                this.center.lon -= dx * metersPerPixel / 111320;
                this.center.lat += dy * metersPerPixel / 110540;
                
                this.lastMouse = { x: e.clientX, y: e.clientY };
                this.render();
            } else {
                // Check if hovering over a marker
                const rect = this.canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const filtered = this.filterIncidents();
                let overMarker = false;
                
                for (let incident of filtered) {
                    const pos = this.latLonToPixel(incident.lat, incident.lon);
                    const distance = Math.sqrt(Math.pow(mouseX - pos.x, 2) + Math.pow(mouseY - pos.y, 2));
                    
                    if (distance <= 16) {
                        overMarker = true;
                        break;
                    }
                }
                
                this.canvas.style.cursor = overMarker ? 'pointer' : 'grab';
            }
        });

        this.canvas.addEventListener('mouseup', e => {
            const wasDragging = this.isDragging && 
                (Math.abs(e.clientX - this.dragStart.x) > 5 || Math.abs(e.clientY - this.dragStart.y) > 5);
            
            this.isDragging = false;
            
            if (!wasDragging) {
                // This was a click, not a drag
                this.handleMapClick(e);
            } else {
                this.updateIncidentsList();
            }
        });

        this.canvas.addEventListener('mouseleave', () => {
            this.isDragging = false;
        });

        // Wheel zoom - zoom to mouse position
        this.canvas.addEventListener('wheel', e => {
            e.preventDefault();
            
            const rect = this.canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            // Get the geographic coordinates under the mouse before zoom
            const scale = Math.pow(2, this.zoom);
            const worldSize = this.tileSize * scale;
            const metersPerPixel = 156543.03392 * Math.cos(this.center.lat * Math.PI / 180) / Math.pow(2, this.zoom);
            
            const dx = mouseX - this.canvas.width / 2;
            const dy = mouseY - this.canvas.height / 2;
            
            const mouseLon = this.center.lon + (dx * metersPerPixel / 111320);
            const mouseLat = this.center.lat - (dy * metersPerPixel / 110540);
            
            // Change zoom level
            const oldZoom = this.zoom;
            if (e.deltaY < 0) {
                this.zoom = Math.min(this.zoom + 1, 18);
            } else {
                this.zoom = Math.max(this.zoom - 1, 3);
            }
            
            // If zoom changed, adjust center to keep mouse position steady
            if (this.zoom !== oldZoom) {
                const newMetersPerPixel = 156543.03392 * Math.cos(this.center.lat * Math.PI / 180) / Math.pow(2, this.zoom);
                
                const newDx = mouseX - this.canvas.width / 2;
                const newDy = mouseY - this.canvas.height / 2;
                
                this.center.lon = mouseLon - (newDx * newMetersPerPixel / 111320);
                this.center.lat = mouseLat + (newDy * newMetersPerPixel / 110540);
            }
            
            this.render();
        });

        // Resize
        window.addEventListener('resize', () => this.resizeCanvas());
    }
};

// Start the app
window.addEventListener('load', () => app.init());
    </script>
